name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  schedule:
    # timezone: UTC
    # 避開整點時間，因為有可能會有時間上的延誤
    - cron: '45 0-3 * * *'

env:
  BITFINEX_API_KEY: ${{ secrets.BITFINEX_API_KEY }}
  BITFINEX_API_SECRET: ${{ secrets.BITFINEX_API_SECRET }}
  TELEGRAM_CHAT_ID: '-4119951617'
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      id-token: write
      pages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Dump GitHub context
        env:
          ACTION_CONTEXT: |
            {
              "env": ${{ toJSON(env) }},
              "github": ${{ toJSON(github) }},
              "inputs": ${{ toJSON(inputs) }},
              "job": ${{ toJSON(job) }},
              "runner": ${{ toJSON(runner) }},
              "secrets": ${{ toJSON(secrets) }},
              "steps": ${{ toJSON(steps) }},
              "vars": ${{ toJSON(vars) }}
            }
        run: echo "$ACTION_CONTEXT" | jq .
      - uses: liskin/gh-workflow-keepalive@v1
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          node-version: lts/*
      - name: install and build
        run: |
          set -ex
          yarn
          yarn tsx ./bin/funding-export-credits-1.ts
          INPUT_CURRENCYS=USD,UST yarn tsx ./bin/funding-statistics-1.ts
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
