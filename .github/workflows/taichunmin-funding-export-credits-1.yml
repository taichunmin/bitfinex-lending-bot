name: 'taichunmin funding-export-credits-1'

on:
  workflow_dispatch:
  schedule:
    # timezone: UTC
    # 避開整點時間，因為有可能會有時間上的延誤
    - cron: '38 0-3 * * *'

env:
  BITFINEX_API_KEY: ${{ secrets.BITFINEX_API_KEY }}
  BITFINEX_API_SECRET: ${{ secrets.BITFINEX_API_SECRET }}
  TELEGRAM_CHAT_ID: '-4119951617'
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

jobs:
  bitfinex:
    # 避免被 fork 的 repository 觸發，請改成自己的 GitHub 帳號
    if: github.repository_owner == 'taichunmin'
    # 這個名字必須跟 repo 的 Environments 名稱一樣
    environment: taichunmin-funding-export-credits-1
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Dump GitHub context
        env:
          ACTION_CONTEXT: |
            {
              "env": ${{ toJSON(env) }},
              "github": ${{ toJSON(github) }},
              "inputs": ${{ toJSON(inputs) }},
              "job": ${{ toJSON(job) }},
              "runner": ${{ toJSON(runner) }},
              "secrets": ${{ toJSON(secrets) }},
              "steps": ${{ toJSON(steps) }},
              "vars": ${{ toJSON(vars) }}
            }
        run: echo "$ACTION_CONTEXT" | jq .
      - uses: liskin/gh-workflow-keepalive@v1
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          node-version: lts/*
      - uses: google-github-actions/auth@v3
        with:
          project_id: taichunmin
          workload_identity_provider: projects/391399927959/locations/global/workloadIdentityPools/github/providers/bitfinex-lending-bot
      - name: Install dependencies, eslint, and run
        run: |
          set -ex
          yarn > /dev/null 2>&1
          yarn lint
          yarn tsx ./bin/funding-export-credits-1.ts
      - id: upload-folder
        uses: google-github-actions/upload-cloud-storage@v3
        with:
          project_id: taichunmin
          path: dist/funding-export-credits-1
          destination: storage-taichunmin.taichunmin.idv.tw/bitfinex-funding-credits-1
          parent: false
          glob: '**/*.csv'
          headers: |-
            cache-control: 'public, no-transform, max-age=30'
            content-encoding: 'gzip'
            content-type: 'text/csv'
